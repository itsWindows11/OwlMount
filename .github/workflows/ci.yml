name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test tests/OwlMount.Tests/ --configuration Release --verbosity normal

  publish:
    name: Publish (AOT, win-x64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained AOT executable
        run: dotnet publish src/OwlMount.CLI/OwlMount.CLI.csproj -c Release -r win-x64 --self-contained /p:PublishAot=true -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: owlmount-win-x64
          path: publish/

      - name: Publish WinUI desktop app
        run: dotnet publish src/OwlMount.WinUI/OwlMount.WinUI.csproj -c Release -r win-x64 --self-contained -o publish-winui

      - name: Upload WinUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: owlmount-winui-win-x64
          path: publish-winui/
